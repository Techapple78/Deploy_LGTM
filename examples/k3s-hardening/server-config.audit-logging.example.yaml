# Exemple a adapter sur chaque noeud serveur K3S.
# Chemin cible courant: /etc/rancher/k3s/config.yaml
#
# Pre-requis:
# - sauvegarde du fichier actuel;
# - fenetre de maintenance;
# - copie de examples/k3s-hardening/audit-policy.yaml vers
#   /etc/rancher/k3s/audit-policy.yaml sur le serveur;
# - redemarrage controle du service k3s.

kube-apiserver-arg:
  - "audit-policy-file=/etc/rancher/k3s/audit-policy.yaml"
  - "audit-log-path=/var/log/kubernetes/audit/audit.log"
  - "audit-log-maxage=30"
  - "audit-log-maxbackup=10"
  - "audit-log-maxsize=100"
  - "audit-log-format=json"
