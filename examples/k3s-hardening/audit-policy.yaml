apiVersion: audit.k8s.io/v1
kind: Policy
metadata:
  name: deploy-lgtm-k3s-audit-policy
rules:
  - level: None
    nonResourceURLs:
      - /healthz*
      - /livez*
      - /readyz*
      - /version

  - level: Metadata
    users:
      - system:kube-proxy
      - system:kube-scheduler
      - system:kube-controller-manager
      - system:apiserver

  - level: Metadata
    namespaces:
      - kube-system
      - argocd
      - kyverno
      - observability
    resources:
      - group: ""
        resources:
          - secrets
          - configmaps
          - serviceaccounts
      - group: rbac.authorization.k8s.io
        resources:
          - roles
          - rolebindings
          - clusterroles
          - clusterrolebindings
      - group: admissionregistration.k8s.io
        resources:
          - mutatingwebhookconfigurations
          - validatingwebhookconfigurations
      - group: kyverno.io
        resources:
          - policies
          - clusterpolicies

  - level: Request
    verbs:
      - create
      - update
      - patch
      - delete
    resources:
      - group: ""
        resources:
          - pods
          - pods/exec
          - pods/attach
          - pods/portforward
      - group: apps
        resources:
          - deployments
          - daemonsets
          - statefulsets
      - group: networking.k8s.io
        resources:
          - networkpolicies
      - group: argoproj.io
        resources:
          - applications

  - level: Metadata
    omitStages:
      - RequestReceived
