replicas: 1

admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 10Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc.cluster.local
        isDefault: false
      - name: Mimir
        type: prometheus
        access: proxy
        url: http://mimir-gateway.observability.svc.cluster.local/prometheus
        isDefault: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        isDefault: false

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: deploy-lgtm
        orgId: 1
        folder: Deploy_LGTM
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/deploy-lgtm

dashboards:
  deploy-lgtm:
    sample-app-overview:
      json: |
        {
          "annotations": {
            "list": [
              {
                "builtIn": 1,
                "datasource": {
                  "type": "grafana",
                  "uid": "-- Grafana --"
                },
                "enable": true,
                "hide": true,
                "iconColor": "rgba(0, 211, 255, 1)",
                "name": "Annotations & Alerts",
                "type": "dashboard"
              }
            ]
          },
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "id": null,
          "links": [],
          "panels": [
            {
              "datasource": "Mimir",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "red",
                        "value": null
                      },
                      {
                        "color": "green",
                        "value": 1
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "gridPos": {
                "h": 4,
                "w": 6,
                "x": 0,
                "y": 0
              },
              "id": 1,
              "options": {
                "colorMode": "value",
                "graphMode": "area",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "textMode": "auto"
              },
              "pluginVersion": "12.3.0",
              "targets": [
                {
                  "expr": "up{app=\"sample-node-mysql\",service=\"api\"}",
                  "legendFormat": "sample app",
                  "refId": "A"
                }
              ],
              "title": "Application Up",
              "type": "stat"
            },
            {
              "datasource": "Mimir",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "red",
                        "value": null
                      },
                      {
                        "color": "green",
                        "value": 1
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "gridPos": {
                "h": 4,
                "w": 6,
                "x": 6,
                "y": 0
              },
              "id": 2,
              "options": {
                "colorMode": "value",
                "graphMode": "area",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "textMode": "auto"
              },
              "targets": [
                {
                  "expr": "mysql_up{app=\"sample-node-mysql\"}",
                  "legendFormat": "mysql",
                  "refId": "A"
                }
              ],
              "title": "MySQL Up",
              "type": "stat"
            },
            {
              "datasource": "Mimir",
              "fieldConfig": {
                "defaults": {
                  "unit": "reqps"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 4
              },
              "id": 3,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "none"
                }
              },
              "targets": [
                {
                  "expr": "sum(rate(http_server_requests_total{app=\"sample-node-mysql\"}[5m])) by (route,status)",
                  "legendFormat": "{{route}} {{status}}",
                  "refId": "A"
                }
              ],
              "title": "HTTP Requests",
              "type": "timeseries"
            },
            {
              "datasource": "Mimir",
              "fieldConfig": {
                "defaults": {
                  "unit": "s"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 4
              },
              "id": 4,
              "options": {
                "legend": {
                  "displayMode": "table",
                  "placement": "bottom"
                },
                "tooltip": {
                  "mode": "multi",
                  "sort": "none"
                }
              },
              "targets": [
                {
                  "expr": "histogram_quantile(0.95, sum(rate(http_server_duration_seconds_bucket{app=\"sample-node-mysql\"}[5m])) by (le, route))",
                  "legendFormat": "p95 {{route}}",
                  "refId": "A"
                }
              ],
              "title": "HTTP p95 Latency",
              "type": "timeseries"
            },
            {
              "datasource": "Loki",
              "gridPos": {
                "h": 9,
                "w": 24,
                "x": 0,
                "y": 12
              },
              "id": 5,
              "options": {
                "dedupStrategy": "none",
                "enableLogDetails": true,
                "prettifyLogMessage": true,
                "showCommonLabels": false,
                "showLabels": false,
                "showTime": true,
                "sortOrder": "Descending",
                "wrapLogMessage": true
              },
              "targets": [
                {
                  "expr": "{namespace=\"sample-app\", app=\"sample-node-mysql\"} |= \"trace_id\"",
                  "refId": "A"
                }
              ],
              "title": "Sample App Logs",
              "type": "logs"
            }
          ],
          "refresh": "30s",
          "schemaVersion": 39,
          "tags": [
            "deploy-lgtm",
            "sample-app"
          ],
          "templating": {
            "list": []
          },
          "time": {
            "from": "now-1h",
            "to": "now"
          },
          "timepicker": {},
          "timezone": "browser",
          "title": "Deploy_LGTM Sample App Overview",
          "uid": "deploy-lgtm-sample-app",
          "version": 1,
          "weekStart": ""
        }
