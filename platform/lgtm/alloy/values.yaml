            "__address__"     = "snmp-exporter.observability.svc.cluster.local:9116",
            "__param_target"  = "unifi-snmp-target.observability.svc.cluster.local",
            "__param_module"  = "hrSystem",
            "__param_auth"    = "public_v2",
            "app"             = "unifi",
            "environment"     = "infra",
            "namespace"       = "observability",
