controller:
  type: daemonset

alloy:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: syslog-tcp
      port: 1514
      targetPort: 1514
      protocol: TCP
    - name: syslog-udp
      port: 1514
      targetPort: 1514
      protocol: UDP
  configMap:
    create: true
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }

      loki.relabel "syslog" {
        forward_to = [loki.write.default.receiver]

        rule {
          action = "labelmap"
          regex  = "__syslog_(.+)"
        }
      }

      loki.source.syslog "infra" {
        listener {
          address                 = "0.0.0.0:1514"
          protocol                = "tcp"
          syslog_format           = "rfc3164"
          use_incoming_timestamp  = true
          labels                  = {
            job         = "infra-syslog",
            source_type = "infra",
            protocol    = "tcp",
          }
        }

        listener {
          address                 = "0.0.0.0:1514"
          protocol                = "udp"
          syslog_format           = "rfc3164"
          use_incoming_timestamp  = true
          labels                  = {
            job         = "infra-syslog",
            source_type = "infra",
            protocol    = "udp",
          }
        }

        forward_to = [loki.relabel.syslog.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.observability.svc.cluster.local/api/v1/push"
        }
      }

      prometheus.scrape "sample_app" {
        targets = [
          {
            "__address__" = "sample-node-mysql.sample-app.svc.cluster.local:3000",
            "app" = "sample-node-mysql",
            "environment" = "dev",
            "namespace" = "sample-app",
            "service" = "api",
            "component" = "backend",
          },
        ]
        metrics_path = "/metrics"
        forward_to   = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "sample_mysql" {
        targets = [
          {
            "__address__" = "sample-mysql-exporter.sample-app.svc.cluster.local:9104",
            "app" = "sample-node-mysql",
            "environment" = "dev",
            "namespace" = "sample-app",
            "service" = "mysql",
            "component" = "database",
          },
        ]
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      otelcol.receiver.otlp "default" {
        grpc {}
        http {}
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-otlp.observability.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi
