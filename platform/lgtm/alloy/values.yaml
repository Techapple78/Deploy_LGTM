        forward_to   = [prometheus.remote_write.mimir.receiver]
      }

      otelcol.receiver.otlp "default" {
        grpc {}
        http {}
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-otlp.observability.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi
