controller:
  type: daemonset

alloy:
  stabilityLevel: experimental
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: syslog-tcp
      port: 1514
      targetPort: 1514
      protocol: TCP
    - name: syslog-udp
      port: 1514
      targetPort: 1514
      protocol: UDP
  configMap:
    create: true
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.relabel.pods.receiver]
      }

      loki.relabel "pods" {
        forward_to = [loki.write.default.receiver]

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
          separator     = "/"
          target_label  = "job"
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }

      loki.relabel "syslog" {
        forward_to = [loki.write.default.receiver]

        rule {
          action = "labelmap"
          regex  = "__syslog_(.+)"
        }
      }

      loki.source.syslog "infra" {
        listener {
          address                 = "0.0.0.0:1514"
          protocol                = "tcp"
          syslog_format           = "raw"
          labels                  = {
            job         = "infra-syslog",
            source_type = "infra",
            protocol    = "tcp",
          }
        }

        listener {
          address                 = "0.0.0.0:1514"
          protocol                = "udp"
          syslog_format           = "raw"
          labels                  = {
            job         = "infra-syslog",
            source_type = "infra",
            protocol    = "udp",
          }
        }

        forward_to = [loki.relabel.syslog.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.observability.svc.cluster.local/api/v1/push"
        }
      }

      prometheus.scrape "phase5_telemetry_app" {
        targets = [
          {
            "__address__" = "phase5-telemetry-app.phase5-telemetry.svc.cluster.local:3000",
            "app" = "phase5-telemetry-app",
            "environment" = "dev",
            "namespace" = "phase5-telemetry",
            "service" = "web",
            "component" = "phase5-test",
          },
        ]
        metrics_path = "/metrics"
        forward_to   = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "pfsense_snmp_interfaces" {
        targets = [
          {
            "__address__"     = "snmp-exporter.observability.svc.cluster.local:9116",
            "__param_target"  = "pfsense-snmp-target.observability.svc.cluster.local",
            "__param_module"  = "if_mib",
            "__param_auth"    = "public_v2",
            "app"             = "pfsense",
            "environment"     = "infra",
            "namespace"       = "observability",
            "service"         = "snmp",
            "component"       = "firewall",
            "instance"        = "pfsense",
            "snmp_module"     = "if_mib",
          },
        ]
        metrics_path = "/snmp"
        forward_to   = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "pfsense_snmp_system" {
        targets = [
          {
            "__address__"     = "snmp-exporter.observability.svc.cluster.local:9116",
            "__param_target"  = "pfsense-snmp-target.observability.svc.cluster.local",
            "__param_module"  = "hrSystem",
            "__param_auth"    = "public_v2",
            "app"             = "pfsense",
            "environment"     = "infra",
            "namespace"       = "observability",
            "service"         = "snmp",
            "component"       = "firewall",
            "instance"        = "pfsense",
            "snmp_module"     = "hrSystem",
