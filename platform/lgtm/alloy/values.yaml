      }

      prometheus.scrape "synology_snmp_system" {
        targets = [
          {
            "__address__"     = "snmp-exporter.observability.svc.cluster.local:9116",
            "__param_target"  = "synology-snmp-target.observability.svc.cluster.local",
            "__param_module"  = "hrSystem",
            "__param_auth"    = "public_v2",
            "app"             = "synology",
            "environment"     = "infra",
            "namespace"       = "observability",
            "service"         = "snmp",
            "component"       = "nas",
            "instance"        = "synology.example.local",
            "snmp_module"     = "hrSystem",
          },
        ]
        metrics_path = "/snmp"
