apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: snmp-exporter
    app.kubernetes.io/part-of: deploy-lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snmp-exporter
        app.kubernetes.io/part-of: deploy-lgtm
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/snmp_exporter/snmp.yml
            - --web.listen-address=:9116
          ports:
            - name: metrics
              containerPort: 9116
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: snmp-exporter-config
              mountPath: /etc/snmp_exporter
              readOnly: true
      volumes:
        - name: snmp-exporter-config
          secret:
            secretName: snmp-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: snmp-exporter
    app.kubernetes.io/part-of: deploy-lgtm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: snmp-exporter
  ports:
    - name: metrics
      port: 9116
      targetPort: metrics
