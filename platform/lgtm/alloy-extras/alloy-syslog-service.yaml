apiVersion: v1
kind: Service
metadata:
  name: alloy-syslog
  namespace: observability
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: alloy
    app.kubernetes.io/component: syslog
    app.kubernetes.io/part-of: deploy-lgtm
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: alloy
  ports:
    - name: syslog-tcp
      port: 514
      targetPort: 1514
      protocol: TCP
    - name: syslog-udp
      port: 514
      targetPort: 1514
      protocol: UDP
