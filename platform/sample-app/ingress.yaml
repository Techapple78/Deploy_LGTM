apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-node-mysql
  namespace: sample-app
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: sample-app.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-node-mysql
                port:
                  number: 3000
