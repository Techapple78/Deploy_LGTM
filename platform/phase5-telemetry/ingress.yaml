apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phase5-telemetry-app
  namespace: phase5-telemetry
  labels:
    app.kubernetes.io/name: phase5-telemetry-app
    app.kubernetes.io/part-of: deploy-lgtm
spec:
  ingressClassName: traefik
  rules:
    - host: phase5-app.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phase5-telemetry-app
                port:
                  name: http
