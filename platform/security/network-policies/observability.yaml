---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-lgtm-internal-ingress
  namespace: observability
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - loki
          - mimir
          - tempo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - loki
                  - mimir
                  - tempo
                  - alloy
                  - grafana
---
apiVersion: networking.k8s.io/v1
