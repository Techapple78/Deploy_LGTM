apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deploy-lgtm-root-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TechApple/Deploy_LGTM.git
    targetRevision: main
    path: gitops/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
