name: render

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
      - name: Validate local Kubernetes YAML
        run: |
          find platform gitops clusters secrets -name '*.yaml' -print0 \
            | xargs -0 kubeconform -summary -ignore-missing-schemas

  render-helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Add Helm repositories
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add kyverno https://kyverno.github.io/kyverno/
          helm repo add sealed-secrets https://bitnami.github.io/sealed-secrets
          helm repo update
      - name: Render LGTM charts
        run: |
          mkdir -p rendered
          helm template grafana grafana/grafana --version 10.5.15 --namespace observability -f platform/lgtm/grafana/values.yaml > rendered/grafana.yaml
          helm template loki grafana/loki --version 7.0.0 --namespace observability -f platform/lgtm/loki/values.yaml > rendered/loki.yaml
          helm template mimir grafana/mimir-distributed --version 6.1.0 --namespace observability -f platform/lgtm/mimir/values.yaml > rendered/mimir.yaml
          helm template tempo grafana/tempo --version 1.24.4 --namespace observability -f platform/lgtm/tempo/values.yaml > rendered/tempo.yaml
          helm template alloy grafana/alloy --version 1.10.0 --namespace observability -f platform/lgtm/alloy/values.yaml > rendered/alloy.yaml
      - name: Validate rendered YAML
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -summary -ignore-missing-schemas rendered/*.yaml
